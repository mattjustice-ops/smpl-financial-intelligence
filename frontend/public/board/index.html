<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMPL · We make finance simple · June 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff; --bg2: #f8fafc; --bg3: #f1f5f9;
  --text: #0f172a; --text2: #475569; --text3: #94a3b8;
  --border: rgba(15,23,42,0.1); --border2: rgba(15,23,42,0.18);
  --teal: #1D9E75; --teal-light: rgba(29,158,117,0.1);
  --navy: #1a2e44; --blue: #185FA5;
  --red: #D85A30; --red-light: rgba(216,90,48,0.08);
  --amber: #BA7517; --amber-light: rgba(186,117,23,0.1);
  --green: #1D9E75; --green-light: rgba(29,158,117,0.08);
  --gray: #888780; --lgray: #e2e8f0;
  --r: 6px; --r2: 10px;
  --mono: 'DM Mono', monospace;
  --serif: 'Fraunces', serif;
  --teal: #1D9E75;
  --red: #D85A30;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 13px 24px; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
.logo { font-family: var(--serif); font-size: 17px; font-weight: 300; letter-spacing: -0.3px; }
.logo em { font-style: italic; color: var(--text2); }
.period-badge { font-family: var(--mono); font-size: 11px; color: var(--text2); background: var(--bg2); padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--border); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.ai-global-btn { font-size: 11px; padding: 5px 12px; border: 0.5px solid var(--border2); border-radius: 20px; background: none; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 5px; transition: all .15s; }
.ai-global-btn:hover { background: var(--bg2); color: var(--text); }
/* NAV */
.nav { display: flex; padding: 0 24px; border-bottom: 0.5px solid var(--border); overflow-x: auto; background: var(--bg); }
.nav-btn { padding: 11px 16px; font-size: 12px; color: var(--text2); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color .15s; font-family: inherit; }
.nav-btn:hover:not(.active) { color: var(--text); }
.nav-btn.active { color: var(--text); border-bottom-color: var(--navy); font-weight: 500; }
/* SLIDE */
.slide { padding: 22px 24px; max-width: 100%; }
.slide-title { font-family: var(--serif); font-size: 20px; font-weight: 300; font-style: italic; color: var(--text); margin-bottom: 3px; }
.slide-sub { font-size: 11.5px; color: var(--text2); margin-bottom: 18px; }
/* KPI STRIP */
.kpi-strip { display: grid; gap: 10px; margin-bottom: 18px; }
.kpi-strip-5 { grid-template-columns: repeat(5,1fr); }
.kpi-strip-4 { grid-template-columns: repeat(4,1fr); }
.kpi-strip-6 { grid-template-columns: repeat(6,1fr); }
.kpi { background: var(--bg2); border-radius: var(--r); padding: 11px 13px; }
.kpi-lbl { font-size: 9.5px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.kpi-val { font-size: 20px; font-weight: 500; font-family: var(--mono); line-height: 1; color: var(--text); }
.kpi-delta { font-size: 10px; margin-top: 4px; font-family: var(--mono); }
.pos { color: var(--teal); } .neg { color: var(--red); } .neu { color: var(--text3); }
/* GRID LAYOUTS */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.chart-wrap { position: relative; }
/* CARDS */
.card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r2); padding: 14px 16px; }
.card-title { font-size: 11.5px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.card-sub { font-size: 10px; color: var(--text3); margin-bottom: 11px; }
/* COMMENTARY */
.commentary { background: var(--bg2); border-radius: var(--r); padding: 13px 15px; margin-top: 14px; border-left: 2.5px solid var(--teal); }
.commentary.risk { border-left-color: var(--red); }
.commentary-lbl { font-size: 9.5px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.commentary-text { font-size: 12px; color: var(--text2); line-height: 1.65; }
.ai-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 5px 11px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); border-radius: 20px; cursor: pointer; margin-top: 9px; transition: all .15s; font-family: inherit; }
.ai-btn:hover { background: var(--bg2); color: var(--text); }
.spin { display: inline-block; width: 10px; height: 10px; border: 1.5px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
/* VARIANCE ROWS */
.var-row { display: flex; align-items: center; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
.var-row:last-child { border-bottom: none; }
.var-lbl { color: var(--text2); flex: 1; min-width: 0; }
.var-act { color: var(--text); font-family: var(--mono); font-weight: 500; width: 70px; text-align: right; flex-shrink: 0; }
.var-bud { color: var(--text3); font-family: var(--mono); font-size: 11px; width: 90px; text-align: right; flex-shrink: 0; }
.var-diff { font-family: var(--mono); font-size: 11px; font-weight: 500; width: 60px; text-align: right; flex-shrink: 0; }
.var-diff.pos { color: var(--teal); } .var-diff.neg { color: var(--red); } .var-diff.neu { color: var(--text3); }
/* SECTION LABEL */
.sec-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .7px; color: var(--text3); padding: 10px 0 5px; font-weight: 500; }
/* CHANNEL BARS */
.ch-row { display: grid; grid-template-columns: 120px 1fr 70px 75px; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 11px; }
.ch-row:last-child { border-bottom: none; }
.bar-bg { background: var(--bg2); border-radius: 2px; height: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
/* CASH ROWS */
.cash-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 11px; border-radius: 5px; margin-bottom: 3px; font-size: 12px; }
.cash-row.in { background: var(--green-light); }
.cash-row.out { background: var(--red-light); }
.cash-row.tot { background: var(--bg2); font-weight: 500; }
/* HC GRID */
.hc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.hc-dept { background: var(--bg2); border-radius: var(--r); padding: 11px 13px; }
.hc-name { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.hc-val { font-size: 20px; font-weight: 500; font-family: var(--mono); color: var(--text); }
.hc-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
/* RISK GRID */
.risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.risk-card { border-radius: var(--r); padding: 13px 14px; border: 0.5px solid var(--border); }
.risk-card.rh { border-left: 3px solid var(--red); }
.risk-card.rm { border-left: 3px solid var(--amber); }
.risk-card.op { border-left: 3px solid var(--teal); }
.risk-type { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); margin-bottom: 4px; }
.risk-title { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
.risk-desc { font-size: 11px; color: var(--text2); line-height: 1.55; }
/* PL TABLE */
.pl-tbl { width: 100%; border-collapse: collapse; font-size: 11.5px; table-layout: fixed; }
.pl-tbl th { text-align: right; padding: 5px 7px; font-size: 9.5px; color: var(--text3); font-weight: 500; border-bottom: 0.5px solid var(--border2); }
.pl-tbl th:first-child { text-align: left; }
.pl-tbl td { padding: 5px 7px; border-bottom: 0.5px solid var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pl-tbl td:not(:first-child) { text-align: right; font-family: var(--mono); font-size: 11px; color: var(--text2); }
.pl-tbl td:first-child { color: var(--text); }
.pl-tbl tr.pl-sec td { background: var(--bg2); font-size: 9.5px; text-transform: uppercase; letter-spacing: .4px; color: var(--text2); font-weight: 500; padding: 6px 7px; }
.pl-tbl tr.pl-sub td { font-weight: 500; color: var(--text); border-top: 0.5px solid var(--border2); }
.pl-tbl tr.pl-tot td { font-weight: 500; color: var(--text); border-top: 1.5px solid var(--border2); background: var(--bg2); }
.pl-tbl tr.pl-drill td { background: var(--bg2); font-size: 10.5px; }
.pl-tbl tr.pl-drill td:first-child { padding-left: 22px; color: var(--text2); }
.pl-tbl tr.pl-click td:first-child { cursor: pointer; }
.pl-tbl tr.pl-click:hover td:first-child { color: var(--teal); }
.pl-expand { display: inline-block; width: 14px; font-size: 9px; opacity: .45; }
/* DEPT TABS */
.dtabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.dtab { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); cursor: pointer; background: none; color: var(--text2); font-family: inherit; transition: all .15s; }
.dtab:hover { background: var(--bg2); }
.dtab.on { background: var(--text); color: var(--bg); border-color: var(--text); }
/* FOOTER */
.footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; border-top: 0.5px solid var(--border); margin-top: 6px; }
.footer-note { font-size: 10px; color: var(--text3); }
.export-btns { display: flex; gap: 8px; }
.exp-btn { font-size: 11px; padding: 5px 10px; border: 0.5px solid var(--border); border-radius: var(--r); background: none; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 4px; font-family: inherit; transition: all .15s; }
.exp-btn:hover { background: var(--bg2); }
/* LEGEND */
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.li { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text2); }
.ls { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.vpos { color: var(--teal); font-weight: 500; }
.vneg { color: var(--red); font-weight: 500; }
.vneu { color: var(--text3); }
/* PL SUB NAV */
.subnav { display: flex; gap: 6px; margin-bottom: 14px; }
.snav-btn { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); cursor: pointer; background: none; color: var(--text2); font-family: inherit; transition: all .15s; }
.snav-btn.on { background: var(--navy); color: #fff; border-color: var(--navy); }

.wf-tab-bar{display:flex;gap:4px;margin-bottom:14px}
.wf-tab{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--border);cursor:pointer;background:none;color:var(--text2);font-family:inherit;transition:all .15s}
.wf-tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.roster-tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.roster-tbl th{padding:4px 8px;font-size:9px;font-weight:500;color:var(--text3);border-bottom:0.5px solid var(--border2);text-align:right;white-space:nowrap}
.roster-tbl th:first-child{text-align:left}
.roster-tbl td{padding:4px 8px;border-bottom:0.5px solid var(--border);color:var(--text2);text-align:right;font-family:var(--mono);font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.roster-tbl td:first-child{text-align:left;font-family:inherit;color:var(--text)}
.roster-tbl tr.dept-sep td{background:var(--bg2);font-size:9.5px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);padding:5px 8px;font-family:inherit}
.roster-tbl tr:hover td{background:var(--bg2)}
.sc-impact{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}
.sc-card{background:var(--bg2);border-radius:var(--r);padding:10px 13px;border-left:3px solid}
.sc-card-title{font-size:11px;font-weight:500;color:var(--text);margin-bottom:6px}
.sc-stat-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;border-bottom:0.5px solid var(--border)}
.sc-stat-row:last-child{border-bottom:none}
.sc-stat-lbl{color:var(--text2)}.sc-stat-val{font-family:var(--mono);font-size:10.5px}

/* ── COPILOT ─────────────────────────────────────────────────────────────── */
.copilot-btn { color: var(--teal) !important; font-weight: 500; }
.copilot-btn.active { border-bottom-color: var(--teal) !important; }
.cp-container { display: flex; flex-direction: column; height: calc(100vh - 160px); }
.cp-messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; gap: 12px; }
.cp-msg { display: flex; gap: 10px; align-items: flex-start; }
.cp-msg.user { flex-direction: row-reverse; }
.cp-bubble { max-width: 75%; padding: 11px 14px; border-radius: 12px; font-size: 12.5px; line-height: 1.55; }
.cp-msg.user .cp-bubble { background: var(--navy); color: #fff; border-radius: 12px 12px 2px 12px; }
.cp-msg.assistant .cp-bubble { background: var(--bg2); color: var(--text); border: 0.5px solid var(--border); border-radius: 12px 12px 12px 2px; }
.cp-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; margin-top: 2px; }
.cp-msg.user .cp-avatar { background: var(--navy); color: #fff; }
.cp-msg.assistant .cp-avatar { background: var(--teal); color: #fff; font-size: 10px; }
.cp-input-row { display: flex; gap: 8px; padding: 12px 0 0; border-top: 0.5px solid var(--border); }
.cp-input { flex: 1; padding: 10px 14px; border: 0.5px solid var(--border2); border-radius: 8px; font-size: 12.5px; font-family: inherit; resize: none; background: var(--bg); color: var(--text); outline: none; line-height: 1.4; }
.cp-input:focus { border-color: var(--teal); }
.cp-send { padding: 10px 18px; background: var(--teal); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 500; font-family: inherit; transition: background .15s; white-space: nowrap; }
.cp-send:hover { background: #179062; }
.cp-send:disabled { background: var(--lgray); cursor: not-allowed; }
.cp-chip-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 0 4px; }
.cp-chip { font-size: 11px; padding: 5px 11px; border: 0.5px solid var(--border2); border-radius: 20px; cursor: pointer; background: var(--bg2); color: var(--text2); font-family: inherit; transition: all .15s; }
.cp-chip:hover { background: var(--navy); color: #fff; border-color: var(--navy); }
.cp-source { font-size: 9.5px; color: var(--text3); margin-top: 6px; padding-top: 5px; border-top: 0.5px solid var(--border); }
.cp-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--teal); margin-bottom: 4px; margin-top: 10px; }
.cp-section:first-child { margin-top: 0; }
.cp-thinking { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
.cp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--teal); animation: cpBounce 1.2s infinite; }
.cp-dot:nth-child(2) { animation-delay: .2s; }
.cp-dot:nth-child(3) { animation-delay: .4s; }
@keyframes cpBounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

/* ── THREE STATEMENT TABLE ──────────────────────────────────────────────── */
.ts-sc-btn{font-size:11px;padding:5px 12px;border:none;background:transparent;border-radius:5px;cursor:pointer;color:var(--text2);font-family:inherit;transition:all .15s}
.ts-sc-btn.on{background:var(--bg);color:var(--text);font-weight:500;box-shadow:0 0 0 0.5px var(--border2)}
.ts-tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.ts-tbl th{padding:5px 8px;font-size:9.5px;font-weight:500;color:var(--text3);white-space:nowrap;border-bottom:1px solid var(--border2);text-align:right}
.ts-tbl th:first-child{text-align:left;min-width:185px}
.ts-tbl th:not(:first-child){min-width:80px}
.ts-tbl td{padding:4px 8px;border-bottom:0.5px solid var(--border);white-space:nowrap;text-align:right;font-family:var(--mono);font-size:10.5px;color:var(--text2)}
.ts-tbl td:first-child{text-align:left;font-family:inherit;color:var(--text);font-size:11px}
.ts-tbl tr.ts-sec td{background:var(--bg2);font-size:9px;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);font-weight:500;padding:6px 8px;font-family:inherit;border-top:0.5px solid var(--border2)}
.ts-tbl tr.ts-sub td{font-weight:600;color:var(--text);border-top:0.5px solid var(--border2)}
.ts-tbl tr.ts-tot td{font-weight:600;color:var(--text);border-top:1.5px solid var(--border2);background:var(--bg2)}
.ts-tbl tr.ts-indent td:first-child{padding-left:20px;color:var(--text2);font-size:10.5px}
.ts-tbl .fc-col{color:var(--amber) !important;background:rgba(186,117,23,0.03)}
.ts-tbl .act-col{color:var(--text2)}
.ts-tbl .bud-col{color:var(--blue) !important;background:rgba(24,95,165,0.03)}
.ts-pos{color:var(--teal) !important}
.ts-neg{color:var(--red) !important}
.ts-stmt-hdr{display:flex;align-items:center;gap:8px;margin:18px 0 8px;padding-bottom:6px;border-bottom:1.5px solid var(--border2)}
.ts-stmt-title{font-family:var(--serif);font-size:17px;font-style:italic;font-weight:300;color:var(--text)}
.ts-stmt-badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:500}
.ts-tie-ok{background:rgba(29,158,117,0.1);color:var(--teal)}
.ts-kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
</style>
</head>
<body>

  <div class="logo">SMPL <span style="color:var(--text3);font-weight:300;font-size:13px">· We make finance simple</span></div>
  <div class="topbar-right">
    <span class="period-badge" id="periodBadge"></span>
    <button class="ai-global-btn" onclick="openMdaDeck()">✦ MD&A Deck ↗</button>

</div>
</div>

  <button class="nav-btn" onclick="show('revenue',this)">Revenue &amp; ARR</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ─── DATA ─────────────────────────────────────────────────────────────────
const MO = ['Jan','Feb','Mar','Apr','May','Jun'];
const MO12 = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const ALL12 = MO12;
const ARR_ACT = [76.31, 77.81, 79.5, 81.39, 83.44, 86.1];
const ARR_BUD = [76.23, 77.72, 79.4, 81.27, 83.33, 85.52];
const NN_ACT  = [1.31, 1.505, 1.69, 1.88, 2.06, 2.655];
const NN_BUD  = [1.226, 1.412, 1.589, 1.77, 1.941, 2.185];
const REV_ACT = [6.57, 6.7, 6.84, 7.01, 7.18, 7.41];
const REV_BUD = [6.58, 6.71, 6.85, 7.0, 7.17, 7.35];
const GP_ACT  = [5.16, 5.26, 5.39, 5.53, 5.67, 5.87];
const SM_ACT  = [2.99, 3.0, 3.01, 3.04, 3.1, 3.15];
const RD_ACT  = [2.59, 2.63, 2.66, 2.7, 2.77, 2.76];
const GA_ACT  = [1.35, 1.33, 1.31, 1.3, 1.31, 1.26];
const EBITDA_ACT = [-1.77, -1.69, -1.59, -1.51, -1.51, -1.3];

let charts = {}, openRows = new Set(), curGLDept = 'Marketing', aiCache = {};
const fM = (v,d=2) => {
  if(v===null||v===undefined) return '—';
  d = Math.min(d, 2); // never more than 2 decimal places
  const neg = v < 0, abs = Math.abs(v);
  if(abs >= 1e6) return (neg?'-$':'$') + (abs/1e6).toFixed(Math.min(d,2)) + 'M';
  if(abs >= 1e3) return (neg?'-$':'$') + (abs/1e3).toFixed(0) + 'K';
  return (neg?'-$':'$') + abs.toFixed(0);
};
const fV = v => (v>=0?'+':'')+fM(v);
const fP = (v,b) => b ? ((v-b)/Math.abs(b)*100).toFixed(1)+'%' : '—';
const vCls = (v,inv) => Math.abs(v)<0.005?'vneu':(inv?v<0:v>0)?'vpos':'vneg';
const vSign = (v,inv) => Math.abs(v)<0.005?'vneu':(inv?v<0:v>0)?'pos':'neg';

function buildPLTable() {
  const _fh=document.getElementById('plFcHdr');if(_fh){_fh.textContent='FC '+(MO12[CLOSE_MO_IDX+1]||'Jul')+'–Dec';}
  const tb = document.getElementById('plTbody');

  PL_ROWS.forEach((r,ri)=>{
    const tr = document.createElement('tr');
    if(r.type==='sec'){tr.className='pl-sec';tr.innerHTML=`<td colspan="8">${r.label}</td>`;tb.appendChild(tr);return;}
    const vd=r.a-r.b, yv=r.ytdA-r.ytdB;
    const vCl=vCls(vd,r.inv), yCl=vCls(yv,r.inv);
    const cls=(r.type==='tot'?'pl-tot':r.type==='sub'?'pl-sub pl-click':'pl-click')+(r.gl?' pl-click':'');
    const hasDrill=r.gl&&r.gl.length>0;
    const fcTotal = r.gl ? r.gl.reduce((s,g)=>s+(g.fc||0),0) : null;
    const fcStr = fcTotal>0 ? fM(fcTotal) : r.type==='sub'||r.type==='tot' ? '' : '—';
    tr.className=cls;
    tr.innerHTML=`<td><span class="pl-expand" id="exp${ri}">${hasDrill?'▶':''}</span>${r.label}</td>
      <td style="text-align:right;font-family:var(--mono)">${fM(r.a)}</td>

      <td class="${vCl}" style="text-align:right;font-family:var(--mono)">${(vd/Math.abs(r.b)*100).toFixed(1)}%</td>
      <td style="text-align:right;font-family:var(--mono)">${fM(r.ytdA)}</td>
      <td class="${yCl}" style="text-align:right;font-family:var(--mono)">${fV(yv)}</td>
      <td style="text-align:right;font-family:var(--mono);color:var(--amber)">${fcStr}</td>`;
    if(hasDrill) tr.addEventListener('click',()=>togglePLRow(ri,r.gl,r.inv));
    tb.appendChild(tr);
    if(hasDrill){
      r.gl.forEach((g,gi)=>{
        const gtr=document.createElement('tr');
        gtr.id='drill'+ri+'_'+gi;
        gtr.className='pl-drill';
        gtr.style.display='none';
        const gv=g.a-g.b;
        const gvc=vCls(gv,r.inv);

          <td class="${gvc}" style="text-align:right;font-family:var(--mono);font-size:10.5px">${(g.b?gv/Math.abs(g.b)*100:0).toFixed(1)}%</td>
          <td style="text-align:right;font-family:var(--mono);font-size:10.5px">${fM(g.ytd)}</td>
          <td class="${vCls(g.ytd-(g.b*5),r.inv)}" style="text-align:right;font-family:var(--mono);font-size:10.5px">${fV(g.ytd-(g.b*5))}</td>
          <td style="text-align:right;font-family:var(--mono);font-size:10.5px;color:var(--amber)">${g.fc!=null?fM(g.fc):'—'}</td>`;
        tb.appendChild(gtr);
      });
    }
  });

function togglePLRow(ri, gl, inv) {
  const exp=document.getElementById('exp'+ri);
  const glRows=gl.map(function(_,gi){return document.getElementById('drill'+ri+'_'+gi);}).filter(Boolean);
  if(!glRows.length) return;
  const open=glRows[0].style.display==='none';
  glRows.forEach(function(row){row.style.display=open?'':'none';});
  if(exp) exp.textContent=open?'▼':'▶';

function renderGLTable(dept) {
  const tb=document.getElementById('glTbody');
  if(!tb) return; tb.innerHTML='';
  const rows=GL_BY_DEPT[dept]||[];
  rows.forEach((r,i)=>{
    const vd=r.a-r.b, vc2=vCls(vd,true);
    const tr=document.createElement('tr');
    tr.style.background=i%2===0?'var(--bg2)':'';
    tr.innerHTML=`<td style="padding-left:8px">${r.n}</td><td>${fM(r.a)}</td><td style="color:var(--text3)">${fM(r.b)}</td><td class="${vc2}">${fV(vd)}</td><td class="${vc2}">${(r.b?vd/Math.abs(r.b)*100:0).toFixed(1)}%</td><td>${fM(r.ytd)}</td><td style="color:var(--amber)">${r.fc!=null?fM(r.fc):'—'}</td>`;
    tb.appendChild(tr);
  });
  const totA=rows.reduce((s,r)=>s+r.a,0),totB=rows.reduce((s,r)=>s+r.b,0),totYTD=rows.reduce((s,r)=>s+r.ytd,0),totFC=rows.reduce((s,r)=>s+(r.fc||0),0);
  const tv=totA-totB,tvc=vCls(tv,true);
  const ttr=document.createElement('tr');
  ttr.style.cssText='font-weight:500;border-top:1px solid var(--border2);background:var(--bg2)';
  ttr.innerHTML=`<td style="padding-left:8px;font-weight:500">Total</td><td style="font-weight:500">${fM(totA)}</td><td style="color:var(--text3)">${fM(totB)}</td><td class="${tvc}" style="font-weight:500">${fV(tv)}</td><td class="${tvc}">${totB?((tv/Math.abs(totB))*100).toFixed(1):'0.0'}%</td><td style="font-weight:500">${fM(totYTD)}</td><td style="color:var(--amber);font-weight:500">${totFC>0?fM(totFC):'—'}</td>`;
  tb.appendChild(ttr);
}

function tsGetPeriods(sc) {
  if(sc === 'Combined') {
    return {
      periods: ['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'],
      isFc:    [false,false,false,false,false,false,true,true,true,true,true,true],
      sources: ['Actual','Actual','Actual','Actual','Actual','Actual','Forecast','Forecast','Forecast','Forecast','Forecast','Forecast'],
    };
  }
  const pd = TS_DATA[sc]?.periods || [];
  // Budget = plan, not forecast — isFc false so Bdgt label renders, not Fcst
  const isFcFlag = sc==='Budget' ? false : sc!=='Actual';
  return { periods: pd, isFc: pd.map(()=>isFcFlag), sources: pd.map(()=>sc) };
}

function tsGet(sc, src, period, stmt, key) {
  const s = src || sc;
  return TS_DATA[s]?.[stmt]?.[period]?.[key] ?? null;
}

const tsFmt = (v, d=1) => {
  if(v===null||v===undefined) return '—';
  const d2=Math.min(d,2), abs=Math.abs(v), neg=v<0;
  let s;
  if(abs>=1e6) s='$'+(abs/1e6).toFixed(d2)+'M';
  else if(abs>=1e3) s='$'+(abs/1e3).toFixed(0)+'K';
  else s='$'+abs.toFixed(0);
  return neg?'('+s+')':s;
};
const tsFmtPct = v => v===null?'—':(v*100).toFixed(1)+'%';
const tsCls = (v, inv=false) => {
  if(v===null||Math.abs(v)<1) return '';
  const good = inv ? v<0 : v>0;
  return good ? 'ts-pos' : 'ts-neg';
};

function tsRender() {
  const sc = window._tsScenario || 'Combined';
  const {periods, isFc, sources} = tsGetPeriods(sc);
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const moLabels = periods.map(p=>mo[parseInt(p.split('-')[1])-1]);

  // KPI strip (latest actual period)
  const latestActP = sc==='Budget' ? periods[5] : periods.filter((_,i)=>!isFc[i]).slice(-1)[0];
  const latestSrc  = sc==='Budget' ? 'Budget' : 'Actual';
  const kpiEl = document.getElementById('tsKpis');
  if(kpiEl) {
    const rev  = tsGet(sc,latestSrc,latestActP,'is','revenue');
    const gp   = tsGet(sc,latestSrc,latestActP,'is','gross_profit');
    const gm   = tsGet(sc,latestSrc,latestActP,'is','gm_pct');
    const ebit = tsGet(sc,latestSrc,latestActP,'is','ebitda');
    const cash = tsGet(sc,latestSrc,latestActP,'bs','cash');
    const ni   = tsGet(sc,latestSrc,latestActP,'is','net_income');
    const cfo  = tsGet(sc,latestSrc,latestActP,'cfs','cfo');
    const eq   = tsGet(sc,latestSrc,latestActP,'bs','equity');
    kpiEl.innerHTML = [
      ['Revenue', tsFmt(rev), sc==='Budget'?'Jun budget':'Jun actual', ''],
      ['Gross Margin', tsFmtPct(gm), 'GAAP gross margin', 'pos'],
      ['EBITDA', tsFmt(ebit), 'Jun operating income', ebit>0?'pos':'neg'],
      ['Cash', tsFmt(cash), 'Ending balance', 'pos'],
    ].map(([l,v,sub,cls])=>`<div class="kpi"><div class="kpi-lbl">${l}</div><div class="kpi-val ${cls==='pos'?'pos':cls==='neg'?'neg':''}" style="font-size:18px">${v}</div><div class="kpi-delta neu">${sub}</div></div>`).join('');
  }

  // Header row
  const colHdrs = periods.map((p,i)=>`<th class="${isFc[i]?'fc-col':sc==='Budget'?'bud-col':'act-col'}" style="min-width:82px">${moLabels[i]}<div style="font-size:8.5px;margin-top:1px;opacity:.7">${isFc[i]?'Fcst':sc==='Budget'?'Bdgt':'Act'}</div></th>`).join('');

  let html = '';

  </div>
  <div style="overflow-x:auto"><table class="ts-tbl">
  <thead><tr><th>Line Item</th>${colHdrs}</tr></thead><tbody>`;

  const isRows = [
    {type:'sec', label:'Revenue'},
    {label:'Subscription Revenue', key:'sub_rev', indent:true},
    {label:'Services Revenue',     key:'svc_rev', indent:true},

  isRows.forEach(r => {

    const cls = r.type==='tot'?'ts-tot':r.type==='sub'?'ts-sub':(r.indent?'ts-indent':'');
    const vals = periods.map((p,i)=>{

      return `<td class="${isFc[i]?'fc-col':sc==='Budget'?'bud-col':''} ${tsCls(v,r.inv)}">${tsFmt(v)}</td>`;

    const cls = r.type==='tot'?'ts-tot':r.type==='sub'?'ts-sub':(r.indent?'ts-indent':'');
    const vals = periods.map((p,i)=>{
      const v = tsGet(sc, sources[i], p, 'cfs', r.key);
      if(v===null) return `<td class="${isFc[i]?'fc-col':sc==='Budget'?'bud-col':''}">—</td>`;
      const colorCls = r.key==='net_change'||r.key==='cfo' ? tsCls(v,false) : '';
      return `<td class="${isFc[i]?'fc-col':sc==='Budget'?'bud-col':''} ${colorCls}">${tsFmt(v)}</td>`;
    }).join('');
    html += `<tr class="${cls}"><td>${r.label}</td>${vals}</tr>`;
  });
  html += `</tbody></table></div>`;

  // ── BALANCE SHEET ─────────────────────────────────────────────────────
  html += `<div class="ts-stmt-hdr">
    <div class="ts-stmt-title">Balance Sheet</div>
    <span class="ts-stmt-badge ts-tie-ok">✓ Assets = Liabilities + Equity</span>
  </div>
  <div style="overflow-x:auto"><table class="ts-tbl">
  <thead><tr><th>Line Item</th>${colHdrs}</tr></thead><tbody>`;

  const bsRows = [
    {type:'sec', label:'Assets'},
    {label:'Cash & Equivalents',        key:'cash', indent:true},
    {label:'Accounts Receivable',       key:'ar', indent:true},
    {label:'Prepaids & Other Current',  key:'prepaids', indent:true},
    {type:'sub', label:'Total Current Assets', compute:(p,src)=>{
      const c=tsGet(sc,src,p,'bs','cash'), ar=tsGet(sc,src,p,'bs','ar'), pr=tsGet(sc,src,p,'bs','prepaids');
      return (c||0)+(ar||0)+(pr||0);
    }},
    {label:'PP&E (Net)',                key:'ppe', indent:true},
    {type:'tot', label:'Total Assets',  key:'total_assets'},
    {type:'sec', label:'Liabilities'},
    {label:'Accounts Payable',         key:'ap', indent:true},
    {label:'Deferred Revenue',         key:'deferred_rev', indent:true},
    {label:'Debt',                     key:'debt', indent:true},
    {type:'sub', label:'Total Liabilities', key:'total_liabilities'},
    {type:'sec', label:"Shareholders' Equity"},
    {label:'Total Equity',             key:'equity', indent:true},
    {type:'tot', label:"Total Liabilities & Equity", key:'total_le'},
  ];

  bsRows.forEach(r => {
    if(r.type==='sec') { html += `<tr class="ts-sec"><td colspan="${periods.length+1}">${r.label}</td></tr>`; return; }
    const cls = r.type==='tot'?'ts-tot':r.type==='sub'?'ts-sub':(r.indent?'ts-indent':'');
    const vals = periods.map((p,i)=>{
      let v;
      if(r.compute) v = r.compute(p, sources[i]);
      else v = tsGet(sc, sources[i], p, 'bs', r.key);
      if(v===null) return `<td class="${isFc[i]?'fc-col':sc==='Budget'?'bud-col':''}">—</td>`;
      return `<td class="${isFc[i]?'fc-col':sc==='Budget'?'bud-col':''}">${tsFmt(v)}</td>`;
    }).join('');
    html += `<tr class="${cls}"><td>${r.label}</td>${vals}</tr>`;
  });
  html += `</tbody></table></div>`;

  const el = document.getElementById('tsContent');
  if(el) el.innerHTML = html;
}

function showSTab(name, btn) {
  Object.values(_sCharts).forEach(c=>{try{c.destroy();}catch(e){}});
  _sCharts={};
  document.querySelectorAll('.subnav .snav-btn').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  _sTab = name;
  _buildSTab(name);
}

function _buildSTab(name) {
  const el = document.getElementById('sContent');
  if(!el) return;
  if(name==='overview') _sOverview(el);
  else if(name==='pipeline') _sPipeline(el);
  else if(name==='map') _sMap(el);

  else if(name==='commissions') _sComm(el);
}

  ebitda: { actual: -1.297, budget: -0.221, var: -1.076, ytd: -8.113 },

    'Cash Forecast': 'Ending cash increased to $70.6M due to $11.18M of customer collections, offset by payroll, vendor payments, commissions, other operating cash outflows, and capex.',
    'Management P&L': 'June revenue of $7.41M was $60K above budget, with gross margin expanding 220bps to 79.2% driven by infrastructure efficiency gains in engineering.',

  sources: {

    revenue: 'Actual_income_statement.csv',
    cash: 'Actual_cash_flow_statement.csv',
    headcount: 'Actual_Employees.csv + Actual_Sales_Quotas.csv',
    gtm: 'Actual_marketing_spend_by_channel.csv',
    mda: 'Actual_Q2_MDA_Commentary_Seed.csv'
  }
};

const CP_SYSTEM = `You are SMPL Copilot, the AI financial intelligence layer for SMPL (formerly ClarityFP), a B2B SaaS company.

SMPL is not generic AI text generation. Every answer is grounded in reconciled financial and operating data with clear lineage to source systems.

For every question, structure your response in exactly three parts:
1. PRIMARY DRIVER + VARIANCE CONTEXT: The single most important metric or movement, with the exact dollar or percentage variance vs budget or prior period.
2. FINANCIAL AND OPERATIONAL ROOT CAUSE: What drove that number - connect the operational metric (ARR movement, headcount change, channel performance) to the financial outcome.
3. RECOMMENDED ACTION + BOARD SUMMARY: One specific, actionable recommendation for the CFO or board, and a one-sentence board-ready summary.

Always cite the source file for each data point you reference.

SMPL June 2026 Actuals (as of close):
${JSON.stringify(CP_DATA, null, 2)}

Rules:
- Use exact numbers from CP_DATA, never round differently than shown
- Always cite source files from CP_DATA.sources
- If asked about something not in CP_DATA, say so explicitly rather than guessing
- Keep each section to 2-3 sentences maximum
- Use dollar signs and percentages consistently`;

let cpHistory = [];
let cpSending = false;

function renderCopilot(area) {
  area.innerHTML = `<div class="slide">
    <div class="slide-title">SMPL Copilot</div>
    <div class="slide-sub">Answers grounded in reconciled financial and operating data with clear lineage to source systems &mdash; June 2026 close</div>
    <div class="cp-container">
      <div class="cp-messages" id="cpMessages">
        <div class="cp-msg assistant">
          <div class="cp-avatar">S</div>
          <div class="cp-bubble">
            <div class="cp-section">Ready</div>
            I have June 2026 actuals loaded from ${Object.keys(CP_DATA.sources).length} source files. Ask me anything about ARR, revenue, cash, headcount, GTM performance, or variance vs budget.
            <div class="cp-source">Sources: ${Object.values(CP_DATA.sources).join(' &middot; ')}</div>
          </div>
        </div>
      </div>
      <div class="cp-chip-row">
        ${['Why did ARR beat budget?','What drove the cash increase?','How did GTM perform in June?','Summarize Q2 for the board','What is the EBITDA variance?','Which sales reps missed quota?'].map(q =>
          `<button class="cp-chip" onclick="cpAsk('${q}')">${q}</button>`
        ).join('')}
      </div>
      <div class="cp-input-row">
        <textarea class="cp-input" id="cpInput" rows="2" placeholder="Ask about any metric, variance, or trend..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();cpSend();}"></textarea>
        <button class="cp-send" id="cpSendBtn" onclick="cpSend()">Ask &#10148;</button>
      </div>
    </div>
  </div>`;
  if(cpHistory.length === 0) cpHistory = [];
}

function cpAsk(q) {
  const input = document.getElementById('cpInput');
  if(input) { input.value = q; cpSend(); }
}

async function cpSend() {
  if(cpSending) return;
  const input = document.getElementById('cpInput');
  const sendBtn = document.getElementById('cpSendBtn');
  const msgs = document.getElementById('cpMessages');
  if(!input || !msgs) return;
  const q = input.value.trim();
  if(!q) return;

  cpSending = true;
  input.value = '';
  if(sendBtn) sendBtn.disabled = true;

  // Add user message
  msgs.innerHTML += `<div class="cp-msg user">
    <div class="cp-avatar">M</div>
    <div class="cp-bubble">${q.replace(/</g,'&lt;')}</div>
  </div>`;

  // Add thinking indicator
  const thinkId = 'cpThink_' + Date.now();
  msgs.innerHTML += `<div class="cp-msg assistant" id="${thinkId}">
    <div class="cp-avatar">S</div>
    <div class="cp-bubble"><div class="cp-thinking">
      <div class="cp-dot"></div><div class="cp-dot"></div><div class="cp-dot"></div>
    </div></div>
  </div>`;
  msgs.scrollTop = msgs.scrollHeight;

  // Add to history
  cpHistory.push({role:'user', content: q});

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: CP_SYSTEM,
        messages: cpHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Unable to generate response.';
    cpHistory.push({role:'assistant', content: reply});

    // Format the three-part response
    const formatted = formatCopilotReply(reply);

    // Replace thinking with response
    const thinkEl = document.getElementById(thinkId);
    if(thinkEl) thinkEl.outerHTML = `<div class="cp-msg assistant">
      <div class="cp-avatar">S</div>
      <div class="cp-bubble">${formatted}</div>
    </div>`;

  } catch(err) {
    const thinkEl = document.getElementById(thinkId);
    if(thinkEl) thinkEl.outerHTML = `<div class="cp-msg assistant">
      <div class="cp-avatar">S</div>
      <div class="cp-bubble" style="color:var(--red)">Connection error. Configure API key to enable Copilot responses. Data context is loaded and ready.</div>
    </div>`;
  }

  cpSending = false;
  if(sendBtn) sendBtn.disabled = false;
  msgs.scrollTop = msgs.scrollHeight;
}

function formatCopilotReply(text) {
  // Format the three structured sections
  let out = text
    .replace(/1\.\s*PRIMARY DRIVER[^:]*:/gi, '<div class="cp-section">1. Primary Driver + Variance Context</div>')
    .replace(/2\.\s*FINANCIAL AND OPERATIONAL[^:]*:/gi, '<div class="cp-section">2. Financial & Operational Root Cause</div>')
    .replace(/3\.\s*RECOMMENDED ACTION[^:]*:/gi, '<div class="cp-section">3. Recommended Action + Board Summary</div>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');

  // Extract source citations if present
  const srcMatch = out.match(/Source[s]?:([^<]+)/i);
  if(srcMatch) {
    out = out.replace(/Source[s]?:[^<]+/i, `<div class="cp-source">Sources: ${srcMatch[1].trim()}</div>`);
  }
  return out;
}
