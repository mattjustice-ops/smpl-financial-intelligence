<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMPL · We make finance simple · May 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff; --bg2: #f8fafc; --bg3: #f1f5f9;
  --text: #0f172a; --text2: #475569; --text3: #94a3b8;
  --border: rgba(15,23,42,0.1); --border2: rgba(15,23,42,0.18);
  --teal: #1D9E75; --teal-light: rgba(29,158,117,0.1);
  --navy: #1a2e44; --blue: #185FA5;
  --red: #D85A30; --red-light: rgba(216,90,48,0.08);
  --amber: #BA7517; --amber-light: rgba(186,117,23,0.1);
  --green: #1D9E75; --green-light: rgba(29,158,117,0.08);
  --gray: #888780; --lgray: #e2e8f0;
  --r: 6px; --r2: 10px;
  --mono: 'DM Mono', monospace;
  --serif: 'Fraunces', serif;
  --teal: #1D9E75;
  --red: #D85A30;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 13px 24px; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
.logo { font-family: var(--serif); font-size: 17px; font-weight: 300; letter-spacing: -0.3px; }
.logo em { font-style: italic; color: var(--text2); }
.period-badge { font-family: var(--mono); font-size: 11px; color: var(--text2); background: var(--bg2); padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--border); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.ai-global-btn { font-size: 11px; padding: 5px 12px; border: 0.5px solid var(--border2); border-radius: 20px; background: none; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 5px; transition: all .15s; }
.ai-global-btn:hover { background: var(--bg2); color: var(--text); }
/* NAV */
.nav { display: flex; padding: 0 24px; border-bottom: 0.5px solid var(--border); overflow-x: auto; background: var(--bg); }
.nav-btn { padding: 11px 16px; font-size: 12px; color: var(--text2); background: none; border: none; cursor: pointer; border-bottom: 2px solid transparent; white-space: nowrap; transition: color .15s; font-family: inherit; }
.nav-btn:hover:not(.active) { color: var(--text); }
.nav-btn.active { color: var(--text); border-bottom-color: var(--navy); font-weight: 500; }
/* SLIDE */
.slide { padding: 22px 24px; max-width: 100%; }
.slide-title { font-family: var(--serif); font-size: 20px; font-weight: 300; font-style: italic; color: var(--text); margin-bottom: 3px; }
.slide-sub { font-size: 11.5px; color: var(--text2); margin-bottom: 18px; }
/* KPI STRIP */
.kpi-strip { display: grid; gap: 10px; margin-bottom: 18px; }
.kpi-strip-5 { grid-template-columns: repeat(5,1fr); }
.kpi-strip-4 { grid-template-columns: repeat(4,1fr); }
.kpi-strip-6 { grid-template-columns: repeat(6,1fr); }
.kpi { background: var(--bg2); border-radius: var(--r); padding: 11px 13px; }
.kpi-lbl { font-size: 9.5px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.kpi-val { font-size: 20px; font-weight: 500; font-family: var(--mono); line-height: 1; color: var(--text); }
.kpi-delta { font-size: 10px; margin-top: 4px; font-family: var(--mono); }
.pos { color: var(--teal); } .neg { color: var(--red); } .neu { color: var(--text3); }
/* GRID LAYOUTS */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.chart-wrap { position: relative; }
/* CARDS */
.card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--r2); padding: 14px 16px; }
.card-title { font-size: 11.5px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.card-sub { font-size: 10px; color: var(--text3); margin-bottom: 11px; }
/* COMMENTARY */
.commentary { background: var(--bg2); border-radius: var(--r); padding: 13px 15px; margin-top: 14px; border-left: 2.5px solid var(--teal); }
.commentary.risk { border-left-color: var(--red); }
.commentary-lbl { font-size: 9.5px; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.commentary-text { font-size: 12px; color: var(--text2); line-height: 1.65; }
.ai-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 5px 11px; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); border-radius: 20px; cursor: pointer; margin-top: 9px; transition: all .15s; font-family: inherit; }
.ai-btn:hover { background: var(--bg2); color: var(--text); }
.spin { display: inline-block; width: 10px; height: 10px; border: 1.5px solid var(--border2); border-top-color: var(--text); border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
/* VARIANCE ROWS */
.var-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
.var-row:last-child { border-bottom: none; }
.var-lbl { color: var(--text2); }
.var-act { color: var(--text); font-family: var(--mono); font-weight: 500; }
.var-bud { color: var(--text3); font-family: var(--mono); font-size: 11px; }
.var-diff { font-family: var(--mono); font-size: 11px; font-weight: 500; }
.var-diff.pos { color: var(--teal); } .var-diff.neg { color: var(--red); } .var-diff.neu { color: var(--text3); }
/* SECTION LABEL */
.sec-lbl { font-size: 9.5px; text-transform: uppercase; letter-spacing: .7px; color: var(--text3); padding: 10px 0 5px; font-weight: 500; }
/* CHANNEL BARS */
.ch-row { display: grid; grid-template-columns: 120px 1fr 70px 75px; gap: 8px; align-items: center; padding: 6px 0; border-bottom: 0.5px solid var(--border); font-size: 11px; }
.ch-row:last-child { border-bottom: none; }
.bar-bg { background: var(--bg2); border-radius: 2px; height: 5px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 2px; }
/* CASH ROWS */
.cash-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 11px; border-radius: 5px; margin-bottom: 3px; font-size: 12px; }
.cash-row.in { background: var(--green-light); }
.cash-row.out { background: var(--red-light); }
.cash-row.tot { background: var(--bg2); font-weight: 500; }
/* HC GRID */
.hc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.hc-dept { background: var(--bg2); border-radius: var(--r); padding: 11px 13px; }
.hc-name { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.hc-val { font-size: 20px; font-weight: 500; font-family: var(--mono); color: var(--text); }
.hc-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
/* RISK GRID */
.risk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.risk-card { border-radius: var(--r); padding: 13px 14px; border: 0.5px solid var(--border); }
.risk-card.rh { border-left: 3px solid var(--red); }
.risk-card.rm { border-left: 3px solid var(--amber); }
.risk-card.op { border-left: 3px solid var(--teal); }
.risk-type { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; color: var(--text3); margin-bottom: 4px; }
.risk-title { font-size: 12px; font-weight: 500; margin-bottom: 4px; }
.risk-desc { font-size: 11px; color: var(--text2); line-height: 1.55; }
/* PL TABLE */
.pl-tbl { width: 100%; border-collapse: collapse; font-size: 11.5px; table-layout: fixed; }
.pl-tbl th { text-align: right; padding: 5px 7px; font-size: 9.5px; color: var(--text3); font-weight: 500; border-bottom: 0.5px solid var(--border2); }
.pl-tbl th:first-child { text-align: left; }
.pl-tbl td { padding: 5px 7px; border-bottom: 0.5px solid var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pl-tbl td:not(:first-child) { text-align: right; font-family: var(--mono); font-size: 11px; color: var(--text2); }
.pl-tbl td:first-child { color: var(--text); }
.pl-tbl tr.pl-sec td { background: var(--bg2); font-size: 9.5px; text-transform: uppercase; letter-spacing: .4px; color: var(--text2); font-weight: 500; padding: 6px 7px; }
.pl-tbl tr.pl-sub td { font-weight: 500; color: var(--text); border-top: 0.5px solid var(--border2); }
.pl-tbl tr.pl-tot td { font-weight: 500; color: var(--text); border-top: 1.5px solid var(--border2); background: var(--bg2); }
.pl-tbl tr.pl-drill td { background: var(--bg2); font-size: 10.5px; }
.pl-tbl tr.pl-drill td:first-child { padding-left: 22px; color: var(--text2); }
.pl-tbl tr.pl-click td:first-child { cursor: pointer; }
.pl-tbl tr.pl-click:hover td:first-child { color: var(--teal); }
.pl-expand { display: inline-block; width: 14px; font-size: 9px; opacity: .45; }
/* DEPT TABS */
.dtabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.dtab { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); cursor: pointer; background: none; color: var(--text2); font-family: inherit; transition: all .15s; }
.dtab:hover { background: var(--bg2); }
.dtab.on { background: var(--text); color: var(--bg); border-color: var(--text); }
/* FOOTER */
.footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; border-top: 0.5px solid var(--border); margin-top: 6px; }
.footer-note { font-size: 10px; color: var(--text3); }
.export-btns { display: flex; gap: 8px; }
.exp-btn { font-size: 11px; padding: 5px 10px; border: 0.5px solid var(--border); border-radius: var(--r); background: none; cursor: pointer; color: var(--text2); display: flex; align-items: center; gap: 4px; font-family: inherit; transition: all .15s; }
.exp-btn:hover { background: var(--bg2); }
/* LEGEND */
.legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.li { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text2); }
.ls { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.vpos { color: var(--teal); font-weight: 500; }
.vneg { color: var(--red); font-weight: 500; }
.vneu { color: var(--text3); }
/* PL SUB NAV */
.subnav { display: flex; gap: 6px; margin-bottom: 14px; }
.snav-btn { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); cursor: pointer; background: none; color: var(--text2); font-family: inherit; transition: all .15s; }
.snav-btn.on { background: var(--navy); color: #fff; border-color: var(--navy); }

.wf-tab-bar{display:flex;gap:4px;margin-bottom:14px}
.wf-tab{font-size:11px;padding:4px 11px;border-radius:20px;border:0.5px solid var(--border);cursor:pointer;background:none;color:var(--text2);font-family:inherit;transition:all .15s}
.wf-tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.roster-tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.roster-tbl th{padding:4px 8px;font-size:9px;font-weight:500;color:var(--text3);border-bottom:0.5px solid var(--border2);text-align:right;white-space:nowrap}
.roster-tbl th:first-child{text-align:left}
.roster-tbl td{padding:4px 8px;border-bottom:0.5px solid var(--border);color:var(--text2);text-align:right;font-family:var(--mono);font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.roster-tbl td:first-child{text-align:left;font-family:inherit;color:var(--text)}
.roster-tbl tr.dept-sep td{background:var(--bg2);font-size:9.5px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:var(--text2);padding:5px 8px;font-family:inherit}
.roster-tbl tr:hover td{background:var(--bg2)}
.sc-impact{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px}
.sc-card{background:var(--bg2);border-radius:var(--r);padding:10px 13px;border-left:3px solid}
.sc-card-title{font-size:11px;font-weight:500;color:var(--text);margin-bottom:6px}
.sc-stat-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px;border-bottom:0.5px solid var(--border)}
.sc-stat-row:last-child{border-bottom:none}
.sc-stat-lbl{color:var(--text2)}.sc-stat-val{font-family:var(--mono);font-size:10.5px}
</style>
</head>

let charts = {}, openRows = new Set(), curGLDept = 'Marketing', aiCache = {};
const fM = (v,d=2) => {
  if(v===null||v===undefined) return '—';
  d = Math.min(d, 2); // never more than 2 decimal places
  const neg = v < 0, abs = Math.abs(v);
  if(abs >= 1e6) return (neg?'-$':'$') + (abs/1e6).toFixed(Math.min(d,2)) + 'M';
  if(abs >= 1e3) return (neg?'-$':'$') + (abs/1e3).toFixed(0) + 'K';
  return (neg?'-$':'$') + abs.toFixed(0);
};
const fV = v => (v>=0?'+':'')+fM(v);
const fP = (v,b) => b ? ((v-b)/Math.abs(b)*100).toFixed(1)+'%' : '—';
const vCls = (v,inv) => Math.abs(v)<0.005?'vneu':(inv?v<0:v>0)?'vpos':'vneg';
const vSign = (v,inv) => Math.abs(v)<0.005?'vneu':(inv?v<0:v>0)?'pos':'neg';

function destroyCharts() { Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}}); charts={}; }

function show(name, btn) {
  destroyCharts();
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.nav-btn').forEach(b=>{if(b.textContent.toLowerCase().includes(name.substr(0,3)))b.classList.add('active');});
  const area = document.getElementById('slideArea');
  area.innerHTML = '';

  if(renders[name]) renders[name](area);
  setTimeout(()=>buildCharts(name),50);
}

function buildPLTable() {
  const tb = document.getElementById('plTbody');
  if(!tb) return; tb.innerHTML='';
  PL_ROWS.forEach((r,ri)=>{
    const tr = document.createElement('tr');
    if(r.type==='sec'){tr.className='pl-sec';tr.innerHTML=`<td colspan="8">${r.label}</td>`;tb.appendChild(tr);return;}
    const vd=r.a-r.b, yv=r.ytdA-r.ytdB;
    const vCl=vCls(vd,r.inv), yCl=vCls(yv,r.inv);
    const cls=(r.type==='tot'?'pl-tot':r.type==='sub'?'pl-sub pl-click':'pl-click')+(r.gl?' pl-click':'');
    const hasDrill=r.gl&&r.gl.length>0;
    const fcTotal = r.gl ? r.gl.reduce((s,g)=>s+(g.fc||0),0) : null;
    const fcStr = fcTotal>0 ? fM(fcTotal) : r.type==='sub'||r.type==='tot' ? '' : '—';
    tr.className=cls;
    tr.innerHTML=`<td><span class="pl-expand" id="exp${ri}">${hasDrill?'▶':''}</span>${r.label}</td>
      <td>${fM(r.a)}</td><td style="color:var(--text3)">${fM(r.b)}</td>
      <td class="${vCl}">${fV(vd)}</td><td class="${vCl}">${(vd/Math.abs(r.b)*100).toFixed(1)}%</td>
      <td>${fM(r.ytdA)}</td><td class="${yCl}">${fV(yv)}</td>
      <td style="color:var(--amber)">${fcStr}</td>`;
    if(hasDrill) tr.addEventListener('click',()=>togglePLRow(ri,r.gl,r.inv));
    tb.appendChild(tr);
    if(hasDrill){
      const dtr=document.createElement('tr');
      dtr.id='drill'+ri; dtr.className='pl-drill'; dtr.style.display='none';
      const dc=document.createElement('td'); dc.colSpan=8; dc.style.padding=0;
      const inner=r.gl.map(g=>{
        const gv=g.a-g.b, gyv=(g.ytd||0)-(g.b*5||0);
        const gvc=vCls(gv,r.inv);
        return `<tr class="pl-drill"><td style="padding-left:22px;font-size:10.5px;color:var(--text2)">${g.n}</td>
          <td>${fM(g.a)}</td><td style="color:var(--text3)">${fM(g.b)}</td>
          <td class="${gvc}">${fV(gv)}</td><td class="${gvc}">${(g.b?gv/Math.abs(g.b)*100:0).toFixed(1)}%</td>
          <td>${fM(g.ytd)}</td><td class="${vCls(g.ytd-(g.b*5),r.inv)}">${fV(g.ytd-(g.b*5))}</td>
          <td style="color:var(--amber)">${g.fc!=null?fM(g.fc):'—'}</td></tr>`;
      }).join('');
      dc.innerHTML=`<table class="pl-tbl" style="border-collapse:collapse">${inner}</table>`;
      dtr.appendChild(dc); tb.appendChild(dtr);
    }
  });
}

function togglePLRow(ri, gl, inv) {

function renderGLTable(dept) {
  const tb=document.getElementById('glTbody');
  if(!tb) return; tb.innerHTML='';
  const rows=GL_BY_DEPT[dept]||[];
  rows.forEach((r,i)=>{
    const vd=r.a-r.b, vc2=vCls(vd,true);
    const tr=document.createElement('tr');
    tr.style.background=i%2===0?'var(--bg2)':'';
    tr.innerHTML=`<td style="padding-left:8px">${r.n}</td><td>${fM(r.a)}</td><td style="color:var(--text3)">${fM(r.b)}</td><td class="${vc2}">${fV(vd)}</td><td class="${vc2}">${(r.b?vd/Math.abs(r.b)*100:0).toFixed(1)}%</td><td>${fM(r.ytd)}</td><td style="color:var(--amber)">${r.fc!=null?fM(r.fc):'—'}</td>`;
    tb.appendChild(tr);
  });
  const totA=rows.reduce((s,r)=>s+r.a,0),totB=rows.reduce((s,r)=>s+r.b,0),totYTD=rows.reduce((s,r)=>s+r.ytd,0),totFC=rows.reduce((s,r)=>s+(r.fc||0),0);
  const tv=totA-totB,tvc=vCls(tv,true);
  const ttr=document.createElement('tr');
  ttr.style.cssText='font-weight:500;border-top:1px solid var(--border2);background:var(--bg2)';
  ttr.innerHTML=`<td style="padding-left:8px;font-weight:500">Total</td><td style="font-weight:500">${fM(totA)}</td><td style="color:var(--text3)">${fM(totB)}</td><td class="${tvc}" style="font-weight:500">${fV(tv)}</td><td class="${tvc}">${totB?((tv/Math.abs(totB))*100).toFixed(1):'0.0'}%</td><td style="font-weight:500">${fM(totYTD)}</td><td style="color:var(--amber);font-weight:500">${totFC>0?fM(totFC):'—'}</td>`;
  tb.appendChild(ttr);
}

    ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false}},scales:{y1:{type:'linear',position:'left',ticks:{callback:v=>'$'+v+'M',font:{size:9}},grid:{color:'rgba(0,0,0,0.04)'}},y2:{type:'linear',position:'right',ticks:{callback:v=>'$'+v.toFixed(1)+'M',font:{size:9}},grid:{display:false}}}}});
  } else if(slide==='arr') {
    // True waterfall: BOP=81.39, +NB 1.80, +Exp 0.91, +React 0.08, -Con 0.24, -Churn 0.49, EOP=83.45
    // Each floating bar = [base_offset, value] using min/max trick
    // For additive bars: base = running total before, bar = component value
    // For subtractive bars: base = running total after (bottom of red bar), bar = abs value
    const wfLabels = ['Begin ARR','New Business','Expansion','Reactivation','Contraction','Churn','End ARR'];
    const BOP = 81.39;
    const nb=1.80, exp=0.91, react=0.08, con=0.24, churn=0.49;
    const afterNB = BOP+nb;           // 83.19
    const afterExp = afterNB+exp;     // 84.10
    const afterReact = afterExp+react;// 84.18
    const afterCon = afterReact-con;  // 83.94 (top of contraction = afterReact, bottom = afterCon)
    const afterChurn = afterCon-churn;// 83.45 = EOP
    // offsets (transparent bottom stack): BOP=0, additive=running_total_before, subtractive=bottom, EOP=0
    const wfOffsets  = [0,        BOP,     afterNB,  afterExp,  afterCon,   afterChurn, 0       ];
    // visible bar heights: BOP=full, additive=component, subtractive=component, EOP=full
    const wfHeights  = [BOP,      nb,      exp,      react,     con,        churn,      afterChurn];
    const wfColors   = ['#185FA5','#1D9E75','#1D9E75','#1D9E75','#D85A30','#D85A30','#185FA5'];
    const wfBorders  = ['#185FA5','#0F6E56','#0F6E56','#0F6E56','#A32D2D','#A32D2D','#185FA5'];
    const wfLabelsTop= [BOP,      nb,       exp,      react,    -con,      -churn,    afterChurn];
    charts.wf=new Chart(document.getElementById('arrWF'),{
      type:'bar',
      data:{labels:wfLabels,datasets:[
        {label:'offset',data:wfOffsets,backgroundColor:'rgba(0,0,0,0)',borderColor:'rgba(0,0,0,0)',borderWidth:0,skipNull:true},
        {label:'value', data:wfHeights,backgroundColor:wfColors,borderColor:wfBorders,borderWidth:1.5,borderRadius:3},
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:ctx=>{if(ctx.datasetIndex===0)return null;const v=wfLabelsTop[ctx.dataIndex];return(v>=0?'+$':'-$')+Math.abs(v).toFixed(2)+'M';}}},

        ctx2.textAlign='center';
        ds1.data.forEach((bar,i)=>{
          const v=wfLabelsTop[i];
          const label=(v>=0?'+$':'-$')+Math.abs(v).toFixed(2)+'M';
          const isBase=(i===0||i===wfLabels.length-1);
          const displayLabel=isBase?('$'+Math.abs(v).toFixed(2)+'M'):label;
          const yPos = v>=0 ? bar.y-6 : bar.y+bar.height+13;

    // Build MRR/ARR waterfall table (matches Image 2)
    // All values in dollars (not millions)
    const WF_TABLE = {
      Beginning:   [75000000,76310000,77815000,79505000,81385000, 83445000,85525473,87711179,89797406,91737548,93717907,95646000],

    };
    const WF_ROWS = ['Beginning','New Business','Expansion','Contraction','Churn','Reactivation','Ending'];
    const WF_POSITIVE = ['Beginning','New Business','Expansion','Reactivation','Ending'];

      const s = abs >= 1000000 ? '$'+( abs/1000000).toFixed(3).replace(/\.?0+$/,'')+'M' : '$'+(abs/1000).toFixed(0)+'K';

  const prompt=`You are a CFO presenting to the board of a B2B SaaS company. Write 3-4 sentences of executive commentary for the ${slideKey} section. Rules: be specific (use exact numbers), explain the operational driver (WHY not just WHAT), include one forward-looking statement or risk, sound like a seasoned CFO not a report generator. Do NOT start with "The data shows." Do NOT use bullet points. Data context: ${AI_CTX[slideKey]}`;
  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const text=data.content?.map(b=>b.text||'').join('')||'Commentary unavailable.';
    txt.textContent=text; aiCache[slideKey]=text;
  } catch(e){ txt.textContent='Unable to connect to AI commentary — static commentary displayed above. Connect to Anthropic API to enable regeneration.'; }
}

function tsSetScenario(sc, btn) {
  window._tsScenario = sc;
  document.querySelectorAll('.ts-sc-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const labels = {
    Combined: 'Jan–May 2026 Actual · Jun–Dec 2026 Forecast',
    Actual:   'Jan–May 2026 Actuals only',
    Budget:   'Jan–Dec 2026 Full-Year Budget',
  };
  const lbl = document.getElementById('tsScenarioLabel');
  if(lbl) lbl.textContent = labels[sc] || sc;
  tsRender();
}

function tsGetPeriods(sc) {
  if(sc === 'Combined') {
    return {
      periods: ['2026-01','2026-02','2026-03','2026-04','2026-05','2026-06','2026-07','2026-08','2026-09','2026-10','2026-11','2026-12'],
      isFc:    [false,false,false,false,false,true,true,true,true,true,true,true],
      sources: ['Actual','Actual','Actual','Actual','Actual','Forecast','Forecast','Forecast','Forecast','Forecast','Forecast','Forecast'],
    };
  }
  const pd = TS_DATA[sc]?.periods || [];
  return { periods: pd, isFc: pd.map(()=>sc!=='Actual'), sources: pd.map(()=>sc) };
}

function tsGet(sc, src, period, stmt, key) {
  const s = src || sc;
  return TS_DATA[s]?.[stmt]?.[period]?.[key] ?? null;
}

const tsFmt = (v, d=1) => {
  if(v===null||v===undefined) return '—';
  const d2=Math.min(d,2), abs=Math.abs(v), neg=v<0;
  let s;
  if(abs>=1e6) s='$'+(abs/1e6).toFixed(d2)+'M';
  else if(abs>=1e3) s='$'+(abs/1e3).toFixed(0)+'K';
  else s='$'+abs.toFixed(0);
  return neg?'('+s+')':s;
};
const tsFmtPct = v => v===null?'—':(v*100).toFixed(1)+'%';
const tsCls = (v, inv=false) => {
  if(v===null||Math.abs(v)<1) return '';
  const good = inv ? v<0 : v>0;
  return good ? 'ts-pos' : 'ts-neg';
};

function tsRender() {
  const sc = window._tsScenario || 'Combined';
  const {periods, isFc, sources} = tsGetPeriods(sc);
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const moLabels = periods.map(p=>mo[parseInt(p.split('-')[1])-1]);

  // KPI strip (latest actual period)
  const latestActP = sc==='Budget' ? periods[4] : periods.filter((_,i)=>!isFc[i]).slice(-1)[0];
  const latestSrc  = sc==='Budget' ? 'Budget' : 'Actual';
  const kpiEl = document.getElementById('tsKpis');
  if(kpiEl) {
    const rev  = tsGet(sc,latestSrc,latestActP,'is','revenue');
    const gp   = tsGet(sc,latestSrc,latestActP,'is','gross_profit');
    const gm   = tsGet(sc,latestSrc,latestActP,'is','gm_pct');
    const ebit = tsGet(sc,latestSrc,latestActP,'is','ebitda');
    const cash = tsGet(sc,latestSrc,latestActP,'bs','cash');
    const ni   = tsGet(sc,latestSrc,latestActP,'is','net_income');
    const cfo  = tsGet(sc,latestSrc,latestActP,'cfs','cfo');
    const eq   = tsGet(sc,latestSrc,latestActP,'bs','equity');
    kpiEl.innerHTML = [
      ['Revenue', tsFmt(rev), sc==='Budget'?'May budget':'May actual', ''],
      ['Gross Margin', tsFmtPct(gm), 'GAAP gross margin', 'pos'],
      ['EBITDA', tsFmt(ebit), 'May operating income', ebit>0?'pos':'neg'],
      ['Cash', tsFmt(cash), 'Ending balance', 'pos'],
    ].map(([l,v,sub,cls])=>`<div class="kpi"><div class="kpi-lbl">${l}</div><div class="kpi-val ${cls==='pos'?'pos':cls==='neg'?'neg':''}" style="font-size:18px">${v}</div><div class="kpi-delta neu">${sub}</div></div>`).join('');
  }

  // Header row
  const colHdrs = periods.map((p,i)=>`<th class="${isFc[i]?'fc-col':'act-col'}" style="min-width:82px">${moLabels[i]}<div style="font-size:8.5px;margin-top:1px;opacity:.7">${isFc[i]?'Fcst':'Act'}</div></th>`).join('');

  let html = '';

  // ── INCOME STATEMENT ──────────────────────────────────────────────────
  html += `<div class="ts-stmt-hdr">
    <div class="ts-stmt-title">Income Statement</div>
    <span class="ts-stmt-badge ts-tie-ok">✓ Ties to Cash Flow</span>
  </div>
  <div style="overflow-x:auto"><table class="ts-tbl">
  <thead><tr><th>Line Item</th>${colHdrs}</tr></thead><tbody>`;

  const isRows = [
    {type:'sec', label:'Revenue'},
    {label:'Subscription Revenue', key:'sub_rev', indent:true},
    {label:'Services Revenue',     key:'svc_rev', indent:true},
    {type:'sub', label:'Total Revenue', key:'revenue'},
    {type:'sec', label:'Cost of Revenue'},
    {label:'Cost of Revenue',      key:'cogs', indent:true, inv:true},
    {type:'sub', label:'Gross Profit', key:'gross_profit'},
    {label:'Gross Margin %',       key:'gm_pct', pct:true, indent:true},
    {type:'sec', label:'Operating Expenses'},
    {label:'Sales & Marketing',    key:'sm', indent:true, inv:true},
    {label:'Research & Development', key:'rd', indent:true, inv:true},
    {label:'General & Administrative', key:'ga', indent:true, inv:true},
    {type:'sub', label:'Total OpEx', key:'total_opex', inv:true},
    {type:'sub', label:'EBITDA',     key:'ebitda', highlight:true},
    {type:'sec', label:'Below-the-Line'},
    {label:'Depreciation & Amortization', key:'da', indent:true, inv:true},
    {label:'Interest Expense',     key:'interest', indent:true, inv:true},
    {type:'sub', label:'Operating Income', key:'op_income'},
    {label:'Pretax Income',        key:'pretax', indent:true},
    {label:'Tax Expense',          key:'tax', indent:true, inv:true},
    {type:'tot', label:'Net Income', key:'net_income'},
  ];

  isRows.forEach(r => {
    if(r.type==='sec') { html += `<tr class="ts-sec"><td colspan="${periods.length+1}">${r.label}</td></tr>`; return; }
    const cls = r.type==='tot'?'ts-tot':r.type==='sub'?'ts-sub':(r.indent?'ts-indent':'');
    const vals = periods.map((p,i)=>{
      const v = tsGet(sc, sources[i], p, 'is', r.key);
      if(v===null) return `<td class="${isFc[i]?'fc-col':''}">—</td>`;
      if(r.pct) return `<td class="${isFc[i]?'fc-col':''}">${tsFmtPct(v)}</td>`;
      return `<td class="${isFc[i]?'fc-col':''} ${tsCls(v,r.inv)}">${tsFmt(v)}</td>`;

    {label:'Total Equity',             key:'equity', indent:true},
    {type:'tot', label:"Total Liabilities & Equity", key:'total_le'},
  ];

  bsRows.forEach(r => {
    if(r.type==='sec') { html += `<tr class="ts-sec"><td colspan="${periods.length+1}">${r.label}</td></tr>`; return; }
    const cls = r.type==='tot'?'ts-tot':r.type==='sub'?'ts-sub':(r.indent?'ts-indent':'');

  html += `</tbody></table></div>`;

  const el = document.getElementById('tsContent');

}

const wfFmt = v => {
  if(v===null||v===undefined) return '—';

  const s=abs>=1e6?'$'+(abs/1e6).toFixed(2)+'M':abs>=1e3?'$'+(abs/1e3).toFixed(0)+'K':'$'+Math.round(abs);
  return neg?'('+s+')':s;
};

function showSTab(name, btn) {

  document.querySelectorAll('.subnav .snav-btn').forEach(b=>b.classList.remove('on'));

          <text x="545" y="230" font-size="13" fill="var(--text3)" text-anchor="middle" font-family="system-ui,sans-serif">Central</text>
          <text x="715" y="230" font-size="13" fill="var(--text3)" text-anchor="middle" font-family="system-ui,sans-serif">East</text>
        </svg>
        <!-- Pins as HTML over SVG -->
        <div style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none">
          ${['West','Central','East','EMEA'].map((reg,ri)=>{
            const d=SD.regions[reg];
            const att=d.may_attained/d.may_quota;
            const col=pinColor(att);
            const pos={West:'left:27%;top:42%',Central:'left:47%;top:38%',East:'left:77%;top:35%',EMEA:'left:87%;top:12%'}[reg];
            const sz=Math.max(36,Math.min(d.reps*4+28,56));
            return `<div style="position:absolute;${pos};transform:translate(-50%,-50%);text-align:center;pointer-events:all">
              <div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${col};border:2.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;margin:0 auto;cursor:default">${d.reps}</div>
              <div style="font-size:9.5px;font-weight:500;margin-top:3px;color:var(--text);white-space:nowrap">${reg}</div>
              <div style="font-size:9px;color:${col};font-family:var(--mono)">${_sp(att)}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">
        <span style="font-size:10px;color:var(--text3)">● Green = ≥100%</span>
        <span style="font-size:10px;color:var(--text3)">● Amber = 90–99%</span>
        <span style="font-size:10px;color:var(--text3)">● Red = &lt;90%</span>
        <span style="font-size:10px;color:var(--text3)">Pin size = rep count · EMEA shown top-right</span>
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:12px">
        <div class="card-title">Regional summary — May 2026</div>
        <table class="pl-tbl"><thead><tr>
          <th style="text-align:left">Region</th><th>Reps</th><th>May Quota</th><th>May Att'd</th><th>May %</th><th>YTD %</th>
        </tr></thead><tbody>
          ${['West','EMEA','East','Central'].map(reg=>{
            const d=SD.regions[reg];
            const mayP=d.may_attained/d.may_quota;
            return `<tr>
              <td style="font-weight:500"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${RCOLS[reg]};margin-right:5px;vertical-align:middle"></span>${reg}</td>
              <td>${d.reps}</td>
              <td>${_sf(d.may_quota,0)}</td>
              <td>${_sf(d.may_attained,0)}</td>
              <td class="${mayP>=1?'pos':mayP>=.9?'amb':'neg'}">${_sp(mayP)}</td>
              <td class="${d.ytd_pct>=1?'pos':d.ytd_pct>=.9?'amb':'neg'}">${_sp(d.ytd_pct)}</td>
            </tr>`;
          }).join('')}
        </tbody></table>
      </div>
      <div class="card">
        <div class="card-title">YTD attained vs quota by region</div>
        <div class="card-sub">Actual YTD attained vs YTD quota ($M)</div>
        <div class="chart-wrap" style="height:150px"><canvas id="sRegBudC" role="img" aria-label="Regional YTD attained versus quota bar chart">Regional comparison of attained to quota.</canvas></div>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{
    const regs=['East','EMEA','West','Central'];
    _smk('sRegBudC',{type:'bar',data:{labels:regs,datasets:[
      {label:'Attained',data:regs.map(r=>+((SD.regions[r].ytd_attained)/1e6).toFixed(2)),backgroundColor:regs.map(r=>RCOLS[r]+'88'),borderColor:regs.map(r=>RCOLS[r]),borderWidth:1,borderRadius:3},
      {label:'Quota',  data:regs.map(r=>+((SD.regions[r].ytd_quota)/1e6).toFixed(2)),backgroundColor:'rgba(0,0,0,0)',borderColor:'rgba(136,135,128,0.5)',borderWidth:1.5,borderRadius:3},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:9},boxWidth:10}}},scales:{x:{ticks:{font:{size:9}},grid:{display:false}},y:{ticks:{callback:v=>'$'+v.toFixed(1)+'M',font:{size:9}},grid:{color:'rgba(0,0,0,0.04)'}}}}});
  },50);
}

function _sReps(el) {
  const sorted=[...SD.reps].sort((a,b)=>b.pct-a.pct);
  el.innerHTML = `
  <div class="two-col" style="margin-bottom:12px">
    <div class="card">
      <div class="card-title">Rep YTD attainment — all 25 reps</div>
      <div class="card-sub">Sorted by attainment % · green ≥100%, amber 90-99%, red &lt;90%</div>
      <div class="chart-wrap" style="height:260px"><canvas id="sRepBarC" role="img" aria-label="Horizontal bar chart of all 25 reps sorted by YTD attainment percentage">25 reps shown by attainment. SDRs lead, AEs ramp.</canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Attainment tier breakdown</div>
      <div class="card-sub">Count of reps in each performance bucket · YTD</div>
      <div class="chart-wrap" style="height:260px"><canvas id="sBktC" role="img" aria-label="Bar chart showing rep count in each attainment bucket">Performance distribution across 5 tiers.</canvas></div>
    </div>
  </div>
  <div class="full-card">
    <div class="card-title" style="margin-bottom:8px">Individual rep detail — YTD Jan–May 2026</div>
    <table class="pl-tbl"><thead><tr>
      <th style="text-align:left;width:16%">Rep</th>
      <th style="text-align:left;width:18%">Role</th>
      <th style="text-align:left">Region</th>
      <th>Annual Quota</th><th>YTD Quota</th><th>YTD Attained</th><th>Attainment</th>
    </tr></thead><tbody>
      ${sorted.map(r=>`<tr>
        <td style="color:var(--text);font-size:11px">${r.name.replace('Actual ','')}</td>
        <td style="font-size:10px;color:var(--text2)">${r.role}</td>
        <td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${RCOLS[r.region]};margin-right:4px;vertical-align:middle"></span>${r.region}</td>
        <td>${_sf(r.annual_q,0)}</td>
        <td>${_sf(r.ytd_q,0)}</td>
        <td>${_sf(r.ytd_a,0)}</td>
        <td>${_pill(r.pct)}</td>
      </tr>`).join('')}
    </tbody></table>
  </div>`;
  setTimeout(()=>{
    const pcts=sorted.map(r=>+(r.pct*100).toFixed(1));
    const cols=pcts.map(p=>p>=100?'#1D9E7599':p>=90?'#BA751799':'#D85A3099');
    _smk('sRepBarC',{type:'bar',data:{labels:sorted.map(r=>r.name.replace('Actual ','')),datasets:[{data:pcts,backgroundColor:cols,borderColor:cols.map(c=>c.slice(0,7)),borderWidth:1,borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{min:70,max:130,ticks:{callback:v=>v+'%',font:{size:8}},grid:{color:'rgba(0,0,0,0.04)'}},y:{ticks:{font:{size:9}},grid:{display:false}}}}});
    const bkts={'<80%':0,'80-90%':0,'90-100%':0,'100-110%':0,'>110%':0};
    SD.reps.forEach(r=>{const p=r.pct*100;if(p<80)bkts['<80%']++;else if(p<90)bkts['80-90%']++;else if(p<100)bkts['90-100%']++;else if(p<110)bkts['100-110%']++;else bkts['>110%']++;});
    _smk('sBktC',{type:'bar',data:{labels:Object.keys(bkts),datasets:[{data:Object.values(bkts),backgroundColor:['#D85A3099','#BA751799','#185FA599','#1D9E7599','#0F6E5699'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:9}},grid:{display:false}},y:{ticks:{stepSize:1,font:{size:9}},grid:{color:'rgba(0,0,0,0.04)'},min:0}}}});
  },50);
}

function _sComm(el) {
  const sorted=[...SD.reps].sort((a,b)=>b.comm-a.comm);
  const roleComms={'Sr Account Executive':0,'Account Executive':0,'Sales Dev Rep':0};
  SD.reps.forEach(r=>{if(r.role in roleComms)roleComms[r.role]+=r.comm;});
  el.innerHTML = `
  <div class="two-col" style="margin-bottom:12px">
    <div class="card">
      <div class="card-title">Commission earned YTD — by rep</div>
      <div class="card-sub">Sr AE rate 10% · AE 9% · SDR 8% of ARR attained</div>
      <div class="chart-wrap" style="height:240px"><canvas id="sCommC" role="img" aria-label="Commission earned YTD by rep sorted from highest to lowest">Commission leaderboard by rep.</canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Commission pool by role</div>
      <div class="card-sub">Share of total YTD commission accrual</div>
      <div class="chart-wrap" style="height:240px"><canvas id="sCommRoleC" role="img" aria-label="Donut chart of commission split by role. Sr AEs earn the largest share.">Sr AEs earn largest commission share due to highest rates and quotas.</canvas></div>
    </div>
  </div>
  <div class="full-card">
    <div class="card-title" style="margin-bottom:10px">Commission leaderboard — all 25 quota carriers · YTD Jan–May 2026</div>
    <table class="pl-tbl"><thead><tr>
      <th style="text-align:left;width:5%">Rank</th>
      <th style="text-align:left;width:16%">Rep</th>
      <th style="text-align:left;width:18%">Role</th>
      <th style="text-align:left">Region</th>
      <th>YTD Attained</th><th>Attainment</th><th>Commission YTD</th>
    </tr></thead><tbody>
      ${sorted.map((r,i)=>`<tr>
        <td style="color:var(--text3);text-align:right">${i+1}</td>
        <td style="color:var(--text);font-size:11px">${r.name.replace('Actual ','')}</td>
        <td style="font-size:10px;color:var(--text2)">${r.role}</td>
        <td><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${RCOLS[r.region]};margin-right:4px;vertical-align:middle"></span>${r.region}</td>
        <td>${_sf(r.ytd_a,0)}</td>
        <td class="${r.pct>=1?'vpos':r.pct>=.9?'amb':'vneg'}">${_sp(r.pct)}</td>
        <td style="color:#1D9E75;font-weight:500">$${r.comm.toLocaleString()}</td>
      </tr>`).join('')}
    </tbody></table>
  </div>`;
  setTimeout(()=>{
    const commCols=sorted.map(r=>({'Sr Account Executive':'#185FA599','Account Executive':'#1D9E7599','Sales Dev Rep':'#534AB799'}[r.role]||'#88878099'));
    _smk('sCommC',{type:'bar',data:{labels:sorted.map(r=>r.name.replace('Actual ','')),datasets:[{data:sorted.map(r=>r.comm),backgroundColor:commCols,borderRadius:3}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+ctx.raw.toLocaleString()}}},scales:{x:{ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'K',font:{size:9}},grid:{color:'rgba(0,0,0,0.04)'}},y:{ticks:{font:{size:9}},grid:{display:false}}}}});
    _smk('sCommRoleC',{type:'doughnut',data:{labels:['Sr AE','AE','SDR'],datasets:[{data:Object.values(roleComms),backgroundColor:['#185FA5','#1D9E75','#534AB7'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'bottom',labels:{font:{size:10},padding:10}}}}});
  },50);
}
// end Sales Intelligence block

// Init
show('exec');
</script>
